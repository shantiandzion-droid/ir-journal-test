name: 每周更新期刊内容
on:
  schedule:
    - cron: '0 0 * * 1' # 每周一零点自动运行
  workflow_dispatch: # 支持手动触发更新

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: 设置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: 安装依赖
        run: pip install scrapy openai pandas python-dotenv
      
      - name: 运行爬虫和大模型处理
        env:
          VOLC_API_KEY: ${{ secrets.VOLC_API_KEY }}
          VOLC_BASE_URL: ${{ secrets.VOLC_BASE_URL }}
          MODEL_NAME: ${{ secrets.MODEL_NAME }}
        run: python crawler.py
      
      - name: 提交更新
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add articles.json
          git commit -m "自动更新期刊内容 $(date +'%Y-%m-%d')" || echo "没有新内容更新"
          git push
